<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Diatonic Studio</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

    <div id="loading-status">ピアノ音源を読み込み中...</div>

    <div class="container">
        <header class="main-header">
            <h1>Diatonic Studio</h1>
            <div class="controls">
                <label for="key-select">Key</label>
                <select id="key-select">
                    <option value="C">C</option>
                    <option value="C#">C# / Db</option>
                    <option value="D">D</option>
                    <option value="D#">Eb / D#</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="F#">F# / Gb</option>
                    <option value="G">G</option>
                    <option value="G#">Ab / G#</option>
                    <option value="A">A</option>
                    <option value="A#">Bb / A#</option>
                    <option value="B">B</option>
                </select>
            </div>
        </header>

        <section class="chord-buttons" id="chord-container"></section>

        <section class="piano-outer">
            <div class="piano-container" id="piano"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
